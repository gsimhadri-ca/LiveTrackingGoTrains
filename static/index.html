<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GO Transit Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      background: #1a6e3c;   /* GO Transit green */
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header .logo {
      background: #fff;
      color: #1a6e3c;
      font-weight: 800;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    /* ── Session bar ─────────────────────────────────────────────────── */
    .session-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
      flex-shrink: 0;
    }
    .session-bar input {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
      width: 160px;
    }
    .session-bar button {
      font-size: 12px;
      color: #c0392b;
      background: none;
      border: 1px solid #c0392b;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .session-bar button:hover { background: #fdf0f0; }

    /* ── Messages ────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a6e3c;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #222;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }
    .msg.status {
      align-self: flex-start;
      background: none;
      color: #888;
      font-size: 13px;
      font-style: italic;
      padding: 2px 4px;
      border: none;
    }
    .msg.error {
      align-self: flex-start;
      background: #fdf0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
    }

    /* ── Suggestions ─────────────────────────────────────────────────── */
    #suggestions {
      padding: 0 20px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #333;
      transition: background 0.15s;
    }
    .chip:hover { background: #e8f5e9; border-color: #1a6e3c; }

    /* ── Input area ──────────────────────────────────────────────────── */
    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      line-height: 1.4;
      font-family: inherit;
    }
    #input:focus { border-color: #1a6e3c; }
    #send {
      background: #1a6e3c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #send:hover:not(:disabled) { background: #155c31; }
  </style>
</head>
<body>

<header>
  <div class="logo">GO</div>
  <div>
    <h1>GO Transit Assistant</h1>
    <p>Lakeshore West · Real-time delays &amp; schedules</p>
  </div>
</header>

<div class="session-bar">
  <span>Session:</span>
  <input type="text" id="session-id" value="default" placeholder="session name" />
  <button id="clear-btn" title="Clear conversation history for this session">Clear history</button>
</div>

<div id="messages"></div>

<div id="suggestions">
  <span class="chip" onclick="sendChip(this)">Any delays right now?</span>
  <span class="chip" onclick="sendChip(this)">Next train from Oakville GO?</span>
  <span class="chip" onclick="sendChip(this)">Is there an elevator at Oakville GO?</span>
  <span class="chip" onclick="sendChip(this)">Any service exceptions today?</span>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Ask about delays, next trains, or station info…"></textarea>
  <button id="send" onclick="sendMessage()">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  function getSessionId() {
    return document.getElementById('session-id').value.trim() || 'default';
  }

  function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = `msg ${cls}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function removeStatusMsgs() {
    messagesEl.querySelectorAll('.msg.status').forEach(el => el.remove());
  }

  function sendChip(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg(text, 'user');

    // Hide suggestion chips after first message
    document.getElementById('suggestions').style.display = 'none';

    let statusEl = null;

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: getSessionId() }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();   // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;

          let evt;
          try { evt = JSON.parse(raw); } catch { continue; }

          if (evt.type === 'status') {
            removeStatusMsgs();
            statusEl = addMsg(evt.text, 'status');

          } else if (evt.type === 'answer') {
            removeStatusMsgs();
            addMsg(evt.text, 'assistant');

          } else if (evt.type === 'error') {
            removeStatusMsgs();
            addMsg(evt.text, 'error');
          }
        }
      }
    } catch (err) {
      removeStatusMsgs();
      addMsg(`Connection error: ${err.message}`, 'error');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Send on Enter (Shift+Enter for newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Clear history button
  document.getElementById('clear-btn').addEventListener('click', async () => {
    const sid = getSessionId();
    if (!confirm(`Clear conversation history for session "${sid}"?`)) return;
    const r = await fetch(`/history/${encodeURIComponent(sid)}`, { method: 'DELETE' });
    if (r.ok) {
      messagesEl.innerHTML = '';
      document.getElementById('suggestions').style.display = 'flex';
      addMsg('History cleared. Starting fresh!', 'status');
    } else {
      addMsg('No saved history found for this session.', 'status');
    }
  });
</script>
</body>
</html>
